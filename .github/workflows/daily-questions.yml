name: Generate Daily Quiz Questions

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate questions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.js

      - name: Commit and push questions
        run: |
          git config user.name  "QuizPop Bot"
          git config user.email "bot@quizpop.co.uk"
          git add data/questions.json data/questions-*.json
          git diff --staged --quiet || git commit -m "🧠 Daily questions: $(date -u +%Y-%m-%d)"
          git push
